services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: pgapp
      POSTGRES_USER: pgapp
      POSTGRES_PASSWORD: secret
    ports:
      - "127.0.0.1:${PGAPP_POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - pgapp-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgapp -d pgapp"]
      interval: 5s
      timeout: 5s
      retries: 20

  pgapp-server:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://pgapp:secret@postgres:5432/pgapp
      PGAPP_BIND_ADDR: 0.0.0.0:50051
      PGAPP_MIN_CONNECTIONS: ${PGAPP_MIN_CONNECTIONS:-1}
      PGAPP_MAX_CONNECTIONS: ${PGAPP_MAX_CONNECTIONS:-20}
      PGAPP_ENABLE_CACHE: ${PGAPP_ENABLE_CACHE:-true}
      PGAPP_ENABLE_MQ: ${PGAPP_ENABLE_MQ:-true}
      PGAPP_ENABLE_CONFIG: "true"
      PGAPP_ENABLE_NOTIFY: ${PGAPP_ENABLE_NOTIFY:-true}
      PGAPP_ENABLE_AUTH: ${PGAPP_ENABLE_AUTH:-false}
      PGAPP_MAX_REDELIVERY_COUNT: ${PGAPP_MAX_REDELIVERY_COUNT:-0}
      PGAPP_DLQ_RETENTION_DAYS: ${PGAPP_DLQ_RETENTION_DAYS:-0}
      PGAPP_MAX_SCHEMA_BYTES: ${PGAPP_MAX_SCHEMA_BYTES:-262144}
      PGAPP_ENABLE_ADMIN: "true"
      PGAPP_ADMIN_BIND_ADDR: 0.0.0.0:8080
      PGAPP_ADMIN_TOKEN: ${PGAPP_ADMIN_TOKEN:-change-me-local-admin-token}
      PGAPP_ADMIN_MAX_PAGE_SIZE: ${PGAPP_ADMIN_MAX_PAGE_SIZE:-100}
    ports:
      - "127.0.0.1:${PGAPP_GRPC_HOST_PORT:-50051}:50051"
      - "127.0.0.1:${PGAPP_ADMIN_HOST_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  admin-ui:
    build:
      context: apps/admin-ui
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:${PGAPP_ADMIN_UI_HOST_PORT:-3000}:80"
    depends_on:
      - pgapp-server

volumes:
  pgapp-postgres-data:

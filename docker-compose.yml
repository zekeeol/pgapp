services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: pgapp
      POSTGRES_USER: pgapp
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgapp -d pgapp"]
      interval: 5s
      timeout: 5s
      retries: 20

  pgapp-server:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://pgapp:secret@postgres:5432/pgapp
      PGAPP_BIND_ADDR: 0.0.0.0:50051
    ports:
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
